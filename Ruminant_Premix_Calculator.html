const App = () => {
  const [species, setSpecies] = useState('Dairy');
  const [breed, setBreed] = useState('Holstein');
  const [stage, setStage] = useState('Fresh / Early Lactation');
  const [dmi, setDmi] = useState(24);
  const [dose, setDose] = useState(100);
  const [milkYield, setMilkYield] = useState(35); // kg/day (dairy), goat ~3, sheep ~2
  const [carrier, setCarrier] = useState('Carrier_Limestone');
  const [currency, setCurrency] = useState('USD');

  // Beef quality toggles
  const [marbling, setMarbling] = useState(false);
  const [colorFocus, setColorFocus] = useState(false);
  const [shelfLife, setShelfLife] = useState(false);

  // Organic inclusion per mineral
  const [organicPct, setOrganicPct] = useState({
    Zn: 30,
    Cu: 30,
    Mn: 20,
    Co: 100,
    Se: 100,
    I: 0,
    Fe: 0
  });
  // Ingredient exclusions (e.g., farm adds them separately)
  const [excluded, setExcluded] = useState({});
  // Editable prices (per kg, in USD baseline; UI will convert)
  const [prices, setPrices] = useState(() => {
    const p = {};
    Object.entries(SOURCES).forEach(([k, v]) => {
      if (v.defaultPrice !== undefined) p[k] = v.defaultPrice;
      if (v.inorg) p[`${k}_inorg`] = v.inorg.defaultPrice;
      if (v.org) p[`${k}_org`] = v.org.defaultPrice;
    });
    return p;
  });

  // When species changes, reset stage/breed to valid defaults
  useEffect(() => {
    const st = Object.keys(REQS[species].stages);
    if (!st.includes(stage)) setStage(st[0]);
    const br = REQS[species].breeds;
    if (!br.includes(breed)) setBreed(br[0]);
  }, [species]);

  // Compute adjusted requirements based on species, stage, milk yield, beef quality
  const adjustedReqs = useMemo(() => {
    const base = {
      ...REQS[species].stages[stage]
    };
    const notes = [];

    // Milk yield adjustment (dairy, goat, sheep)
    if (REQS[species].hasMilkYield && stage.toLowerCase().includes('lactation')) {
      let baseYield = 30;
      if (species === 'Goat') baseYield = 3;
      if (species === 'Sheep') baseYield = 1.5;
      const yieldRatio = milkYield / baseYield;
      if (yieldRatio > 1.1) {
        const bump = Math.min(0.35, (yieldRatio - 1) * 0.5);
        base.Zn = Math.round(base.Zn * (1 + bump));
        base.Cu = Math.round(base.Cu * (1 + bump * 0.3));
        base.Se = +(base.Se * (1 + bump * 0.5)).toFixed(2);
        base.VitE = Math.round(base.VitE * (1 + bump * 0.5));
        base.Biotin = +(base.Biotin * (1 + bump * 0.5)).toFixed(2);
        notes.push(`High yield (${milkYield} kg/d) → Zn, Cu, Se, Vit E, Biotin raised proportionally.`);
      } else if (yieldRatio < 0.9 && yieldRatio > 0) {
        const trim = Math.min(0.25, (1 - yieldRatio) * 0.3);
        base.Zn = Math.round(base.Zn * (1 - trim));
        base.VitE = Math.round(base.VitE * (1 - trim * 0.5));
        notes.push(`Below-average yield (${milkYield} kg/d) → Zn, Vit E trimmed.`);
      }
    }

    // Breed-specific small tweaks
    if (species === 'Dairy') {
      if (breed === 'Jersey' || breed === 'Guernsey') {
        base.VitA = Math.round(base.VitA * 1.05);
        notes.push('Jersey/Guernsey: slightly elevated Vit A (higher butterfat milk).');
      }
    }
    if (species === 'Sheep' && (breed === 'East Friesian' || breed === 'Awassi' || breed === 'Lacaune')) {
      base.Zn = Math.round(base.Zn * 1.10);
      base.VitE = Math.round(base.VitE * 1.20);
      notes.push('Dairy sheep breed: Zn and Vit E raised for milk production support.');
    }
    if (species === 'Beef' && breed === 'Wagyu') {
      // Wagyu benefits from restricted Vit A during finishing + chromium for marbling
      if (stage === 'Finishing') {
        notes.push('Wagyu finishing: extra marbling support recommended (toggle Marbling).');
      }
    }
    // Tropical / Bos indicus breeds — lower metabolic heat tolerance, but need higher Zn for hoof health in humid climates
    if (species === 'Beef' && (breed === 'Brahman' || breed === 'Thai Native (Kha-Korat)' || breed === 'Bali Cattle' || breed === 'Kedah-Kelantan' || breed.startsWith('Brahman ×') || breed === 'Droughtmaster')) {
      base.Zn = Math.round(base.Zn * 1.15);
      base.VitE = Math.round(base.VitE * 1.20);
      base.VitA = Math.round(base.VitA * 1.10);
      notes.push('Tropical / Bos indicus breed: Zn +15% (hoof integrity in humid climates), Vit E +20% (heat-stress antioxidant), Vit A +10% (greater green-forage variability in SEA).');
    }

    // Beef quality adjustments (finishing stage primarily)
    base.Cr = 0;
    if (species === 'Beef') {
      if (marbling) {
        if (stage === 'Finishing' || stage === 'Backgrounding') {
          base.VitA = Math.round(base.VitA * 0.50); // restrict Vit A to promote IMF
